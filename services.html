 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Corner Ribbon */
        .ribbon-wrapper {
            width: 150px;
            height: 150px;
            overflow: hidden;
            position: absolute;
            top: -10px;
            right: -10px;
        }
        .ribbon-content {
            font-weight: 900;
            text-align: center;
            transform: rotate(45deg);
            position: relative;
            padding: 10px 0;
            left: -5px;
            top: 40px;
            width: 220px;
            background-color: #facc15; /* Theme Yellow */
            color: #000; /* Theme Black */
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-100 p-10">

    <div class="max-w-6xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-50 p-8 md:p-16 relative overflow-hidden">
        
        <div class="ribbon-wrapper">
            <div class="ribbon-content">SEO Expert</div>
        </div>

        <div class="relative z-10">
            <h2 class="text-4xl md:text-6xl font-black text-black mb-4 tracking-tighter flex flex-wrap items-center gap-4">
                Get Your Free Audit 
                <span class="inline-block">
                    <svg class="w-12 h-12 md:w-16 md:h-16 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </span>
                <span class="text-yellow-500">Report!</span>
            </h2>
            
            <p class="text-slate-500 text-lg md:text-xl font-medium mb-12">
                Uncover opportunities to grow your business.
            </p>

            <form class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                <input type="text" placeholder="yourwebsite.com" 
                       class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/10 transition-all">
                
                <input type="text" placeholder="Your Name" 
                       class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/10 transition-all">
                
                <input type="text" placeholder="+91 1234567890" 
                       class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/10 transition-all">
                
                <input type="email" placeholder="youremail@xyz.com" 
                       class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/10 transition-all">
            </form>

            <button class="bg-black hover:bg-slate-900 text-white font-black py-5 px-10 rounded-2xl transition-all shadow-xl hover:shadow-yellow-400/20 group flex items-center gap-3 active:scale-95">
                <span>Get My Free Report Now!</span>
                <svg class="w-5 h-5 text-yellow-400 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </div>

        <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-yellow-400/10 rounded-full blur-3xl"></div>
    </div>

</body>
</html>
