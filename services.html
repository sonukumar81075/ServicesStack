<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Platform Slider | Left Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }

        /* Slider Wrapper */
        .slider-container {
            overflow: hidden;
            padding: 40px 0;
            position: relative;
            white-space: nowrap;
        }

        /* The moving track - Direction changed to Left */
        .slider-track {
            display: flex;
            width: max-content;
            /* Changed animation to scroll-left */
            animation: scroll-left 40s linear infinite;
        }

        /* Infinite Animation: Right to Left */
        @keyframes scroll-left {
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } /* Move half-way through the duplicated content */
        }

        /* Stop on hover */
        .slider-container:hover .slider-track {
            animation-play-state: paused;
        }

        /* Card Styling */
        .platform-card {
            width: 280px;
            height: 280px;
            margin: 0 15px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: white;
            border-radius: 8px;
        }

        .platform-card:hover {
            border-color: #2563eb;
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.1);
            transform: translateY(-5px);
        }

        .icon-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-track" id="track">
            <div class="platform-card">
                <div class="icon-circle bg-yellow-700">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" class="w-16 invert" alt="Financial">
                </div>
                <h3 class="text-lg font-bold text-slate-800">Financial Services</h3>
            </div>

            <div class="platform-card">
                <div class="icon-circle bg-[#004a99]">
                    <img src="https://cdn-icons-png.flaticon.com/512/8066/8066270.png" class="w-16 invert" alt="Tech">
                </div>
                <h3 class="text-lg font-bold text-slate-800">Tech & Education</h3>
            </div>

            <div class="platform-card">
                <div class="icon-circle bg-[#26c1c1]">
                    <img src="https://cdn-icons-png.flaticon.com/512/1998/1998087.png" class="w-16 invert" alt="Creative">
                </div>
                <h3 class="text-lg font-bold text-slate-800">Creative & Media</h3>
            </div>

            <div class="platform-card">
                <div class="icon-circle bg-[#0066ff]">
                    <img src="https://cdn-icons-png.flaticon.com/512/427/427735.png" class="w-16 invert" alt="Solar">
                </div>
                <h3 class="text-lg font-bold text-slate-800">Solar & Energy</h3>
            </div>

            <div class="platform-card">
                <div class="icon-circle bg-orange-500">
                    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png" class="w-16 invert" alt="Retail">
                </div>
                <h3 class="text-lg font-bold text-slate-800">E-Commerce</h3>
            </div>
        </div>
    </div>

    <script>
        // Clone the content once to ensure a seamless "infinite" loop when scrolling left
        const track = document.getElementById('track');
        const content = track.innerHTML;
        track.innerHTML = content + content; 
    </script>
</body>
</html>
